<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">Open Finance Greek logo system sheet</title>
  <desc id="desc">Greek-inspired logo variants for Open Finance: horizontal lockup, standalone mark, reverse mark, clearspace, and palette notes.</desc>
  <defs>
    <g id="mark">
      <circle cx="128" cy="128" r="116" fill="#efe7d2" stroke="#15140f" stroke-width="7"/>
      <circle cx="128" cy="128" r="102" fill="#f7f1de" stroke="#b78c38" stroke-width="5" stroke-dasharray="14 8"/>
      <circle cx="128" cy="128" r="84" fill="#efe7d2" stroke="#315f8b" stroke-width="2" opacity=".74"/>
      <g fill="none" stroke="#315f8b" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" opacity=".95">
        <path d="M55 49h35v15H70v20H55z"/>
        <path d="M201 49v35h-15V64h-20V49z"/>
        <path d="M201 207h-35v-15h20v-20h15z"/>
        <path d="M55 207v-35h15v20h20v15z"/>
      </g>
      <path d="M67 105 128 63l61 42z" fill="#efe7d2" stroke="#18344f" stroke-width="9" stroke-linejoin="miter"/>
      <path d="M74 112h108" stroke="#18344f" stroke-width="12" stroke-linecap="square"/>
      <g fill="#18344f">
        <rect x="83" y="126" width="12" height="54"/>
        <rect x="107" y="126" width="12" height="54"/>
        <rect x="137" y="126" width="12" height="54"/>
        <rect x="161" y="126" width="12" height="54"/>
        <rect x="76" y="181" width="104" height="13"/>
        <rect x="88" y="200" width="80" height="8"/>
      </g>
      <g fill="none" stroke="#18344f" stroke-linecap="square">
        <circle cx="128" cy="151" r="34" stroke-width="12"/>
        <path d="M128 112v82" stroke-width="12"/>
        <path d="M128 130h34M128 149h27" stroke-width="9"/>
      </g>
      <g opacity=".82">
        <path d="M60 153c-13 8-21 19-24 33" fill="none" stroke="#5aa889" stroke-width="5" stroke-linecap="round"/>
        <path d="M41 161c5-4 10-4 15 0-4 4-10 4-15 0z" fill="#5aa889" transform="rotate(-33 41 161)"/>
        <path d="M33 177c5-4 10-4 15 0-4 4-10 4-15 0z" fill="#5aa889" transform="rotate(-49 33 177)"/>
        <path d="M196 153c13 8 21 19 24 33" fill="none" stroke="#5aa889" stroke-width="5" stroke-linecap="round"/>
        <path d="M216 160c5-4 10-4 15 0-4 4-10 4-15 0z" fill="#5aa889" transform="rotate(213 216 160)"/>
        <path d="M224 176c5-4 10-4 15 0-4 4-10 4-15 0z" fill="#5aa889" transform="rotate(229 224 176)"/>
      </g>
      <path d="M73 214h110" fill="none" stroke="#b78c38" stroke-width="5" stroke-linecap="square" stroke-dasharray="16 9"/>
      <circle cx="128" cy="222" r="8" fill="#ed6f5c"/>
    </g>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#15140f" stroke-opacity=".05"/>
    </pattern>
    <pattern id="paper-noise" width="140" height="140" patternUnits="userSpaceOnUse">
      <path d="M0 20c44-13 90 10 140-4M0 88c35-10 70 12 140 0" fill="none" stroke="#15140f" stroke-opacity=".035"/>
    </pattern>
  </defs>
  <rect width="1440" height="960" fill="#efe7d2"/>
  <rect width="1440" height="960" fill="url(#grid)"/>
  <rect width="1440" height="960" fill="url(#paper-noise)"/>
  <text x="72" y="96" fill="#15140f" font-family="Inter Tight, Inter, Arial, sans-serif" font-size="66" font-weight="900" letter-spacing="-4">Open</text>
  <text x="226" y="96" fill="#15140f" font-family="Playfair Display, Times New Roman, serif" font-size="68" font-weight="500" font-style="italic" letter-spacing="-5">Finance</text>
  <circle cx="434" cy="76" r="8" fill="#ed6f5c"/>
  <text x="72" y="137" fill="#5a5448" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="15" letter-spacing="2.5">GREEK COIN SEAL / TEMPLE LEDGER MONOGRAM / BANGKOK</text>

  <g transform="translate(72 210)">
    <rect width="560" height="250" fill="#f7f1de" stroke="#15140f" stroke-opacity=".18"/>
    <use href="#mark" x="42" y="30" width="180" height="180"/>
    <text x="248" y="114" fill="#15140f" font-family="Inter Tight, Inter, Arial, sans-serif" font-size="54" font-weight="900" letter-spacing="-3">Open</text>
    <text x="394" y="114" fill="#15140f" font-family="Playfair Display, Times New Roman, serif" font-size="56" font-weight="500" font-style="italic" letter-spacing="-4">Finance</text>
    <path d="M248 150h250" stroke="#315f8b" stroke-width="8" stroke-dasharray="18 9 6 9"/>
    <text x="248" y="194" fill="#5a5448" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="14" letter-spacing="1.4">PRIMARY HORIZONTAL LOCKUP</text>
  </g>

  <g transform="translate(688 210)">
    <rect width="310" height="250" fill="#f4efe3" stroke="#15140f" stroke-opacity=".18"/>
    <use href="#mark" x="55" y="18" width="200" height="200"/>
    <text x="55" y="224" fill="#5a5448" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="14" letter-spacing="1.4">STANDALONE TEMPLE COIN</text>
  </g>

  <g transform="translate(1050 210)">
    <rect width="310" height="250" fill="#18344f"/>
    <g transform="translate(55 18) scale(.78)">
      <circle cx="128" cy="128" r="116" fill="#efe7d2" stroke="#f7f1de" stroke-width="7"/>
      <circle cx="128" cy="128" r="102" fill="none" stroke="#b78c38" stroke-width="5" stroke-dasharray="14 8"/>
      <path d="M67 105 128 63l61 42z" fill="#efe7d2" stroke="#18344f" stroke-width="9" stroke-linejoin="miter"/>
      <path d="M74 112h108" stroke="#18344f" stroke-width="12" stroke-linecap="square"/>
      <g fill="#18344f">
        <rect x="83" y="126" width="12" height="54"/>
        <rect x="107" y="126" width="12" height="54"/>
        <rect x="137" y="126" width="12" height="54"/>
        <rect x="161" y="126" width="12" height="54"/>
        <rect x="76" y="181" width="104" height="13"/>
      </g>
      <g fill="none" stroke="#18344f" stroke-linecap="square">
        <circle cx="128" cy="151" r="34" stroke-width="12"/>
        <path d="M128 112v82" stroke-width="12"/>
        <path d="M128 130h34M128 149h27" stroke-width="9"/>
      </g>
      <circle cx="128" cy="222" r="8" fill="#ed6f5c"/>
    </g>
    <text x="67" y="224" fill="#efe7d2" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="14" letter-spacing="1.4">REVERSE FIELD</text>
  </g>

  <g transform="translate(72 545)">
    <text x="0" y="0" fill="#15140f" font-family="Inter Tight, Inter, Arial, sans-serif" font-size="30" font-weight="900" letter-spacing="-1">Construction</text>
    <text x="0" y="34" fill="#5a5448" font-family="Inter, Arial, sans-serif" font-size="17">Coin ring = private record. Temple = durable ledger. Omicron Phi center = Open Finance. Meander edge = Greek financial order.</text>
    <rect x="0" y="82" width="230" height="96" fill="#efe7d2" stroke="#15140f"/>
    <rect x="0" y="82" width="96" height="96" fill="none" stroke="#ed6f5c" stroke-width="2" stroke-dasharray="7 7"/>
    <use href="#mark" x="0" y="82" width="96" height="96"/>
    <path d="M120 130h100" stroke="#15140f" stroke-width="1"/>
    <text x="120" y="120" fill="#5a5448" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="13" letter-spacing="1">CLEARSPACE</text>
    <text x="120" y="148" fill="#5a5448" font-family="Inter, Arial, sans-serif" font-size="14">Keep one quarter-mark clear around the coin.</text>
  </g>

  <g transform="translate(72 810)">
    <rect width="120" height="54" fill="#efe7d2" stroke="#15140f" stroke-opacity=".18"/>
    <rect x="150" width="120" height="54" fill="#18344f"/>
    <rect x="300" width="120" height="54" fill="#315f8b"/>
    <rect x="450" width="120" height="54" fill="#b78c38"/>
    <rect x="600" width="120" height="54" fill="#ed6f5c"/>
    <rect x="750" width="120" height="54" fill="#5aa889"/>
    <text y="88" fill="#5a5448" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="13" letter-spacing="1.2">PAPER / AEGEAN DARK / AEGEAN / ATTIC COIN / CORAL / OLIVE MINT</text>
  </g>
</svg>
