le = durable ledger. Omicron Phi center = Open Finance. Meander edge = Greek financial order.</text><rect width="230" height="96" x="0" y="82" fill="#efe7d2" stroke="#15140f"/><rect width="96" height="96" x="0" y="82" fill="none" stroke="#ed6f5c" stroke-dasharray="7 7" stroke-width="2"/><use width="96" height="96" x="0" y="82" href="#mark"/><path stroke="#15140f" stroke-width="1" d="M120 130h100"/><text x="120" y="120" fill="#5a5448" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="13" letter-spacing="1">CLEARSPACE</text><text x="120" y="148" fill="#5a5448" font-family="Inter, Arial, sans-serif" font-size="14">Keep one quarter-mark clear around the coin.</text></g><g transform="translate(72 810)"><rect width="120" height="54" fill="#efe7d2" stroke="#15140f" stroke-opacity=".18"/><rect width="120" height="54" x="150" fill="#18344f"/><rect width="120" height="54" x="300" fill="#315f8b"/><rect width="120" height="54" x="450" fill="#b78c38"/><rect width="120" height="54" x="600" fill="#ed6f5c"/><rect width="120" height="54" x="750" fill="#5aa889"/><text y="88" fill="#5a5448" font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="13" letter-spacing="1.2">PAPER / AEGEAN DARK / AEGEAN / ATTIC COIN / CORAL / OLIVE MINT</text></g></svg>