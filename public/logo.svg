<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00CC99"/>
      <stop offset="100%" stop-color="#00B386"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66E6C2"/>
      <stop offset="100%" stop-color="#99F0D6"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Chameleon body - rounder, friendlier shape -->
  <path d="M155 330 C135 290 130 240 155 195 C180 150 225 125 275 118 C325 112 360 130 380 160 C400 190 405 230 388 270 C370 310 340 330 305 338 L320 355 C335 368 325 385 305 382 L255 368 C215 362 180 350 155 330Z" fill="url(#body)" opacity="0.95"/>
  <!-- Chameleon head - bigger and rounder -->
  <ellipse cx="370" cy="198" rx="68" ry="62" fill="url(#body)" opacity="0.95"/>
  <!-- Snout - shorter and rounder -->
  <path d="M410 185 C425 180 435 184 438 193 C432 197 420 195 410 193Z" fill="#99F0D6" opacity="0.8"/>
  <!-- Friendly smile -->
  <path d="M405 205 C415 212 425 213 430 208" stroke="#00996B" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <!-- Eye - outer ring (bigger) -->
  <circle cx="380" cy="188" r="26" fill="#1a3a2e"/>
  <!-- Eye - iris -->
  <circle cx="380" cy="188" r="19" fill="#fbbf24"/>
  <!-- Eye - pupil (vertical slit) -->
  <ellipse cx="380" cy="188" rx="5.5" ry="16" fill="#1a3a2e"/>
  <!-- Eye - highlight -->
  <circle cx="373" cy="181" r="6" fill="white" opacity="0.85"/>
  <!-- Small crest -->
  <path d="M338 155 C345 135 362 128 378 132 C374 145 365 152 352 158Z" fill="#33D4A8" opacity="0.6"/>
  <!-- Curled tail - thicker and friendlier -->
  <path d="M155 330 C135 348 122 375 128 398 C134 420 155 428 170 422 C185 416 188 396 180 380 C172 365 158 358 153 350" stroke="#99F0D6" stroke-width="20" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Front leg -->
  <path d="M278 338 L274 380 C272 390 264 394 258 389 L252 380" stroke="#66E6C2" stroke-width="15" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Back leg -->
  <path d="M218 342 L214 382 C212 392 204 396 198 391 L192 382" stroke="#66E6C2" stroke-width="15" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Single body stripe - simpler -->
  <path d="M200 220 C235 215 275 220 310 245" stroke="#33D4A8" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
